<style>
:root {
  --color-background-primary: #1e1e1e;
  --color-background-secondary: #252525;
  --color-background-tertiary: #333333;
  --color-text-primary: #e0e0e0;
  --color-text-secondary: #a0a0a0;
  --color-text-tertiary: #777777;
  --color-border-secondary: #555555;
  --color-border-tertiary: #333333;
}
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{font-family:Roboto,sans-serif;font-size:13px;color:var(--color-text-primary);background:#121212;padding:20px}
.shell{display:flex;border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;min-height:720px}
.sb{width:148px;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:14px 12px 8px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em}
.sb-item{padding:8px 12px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;border-left:3px solid transparent;line-height:1.35}
.sb-item.active{color:var(--color-text-primary);background:var(--color-background-primary);border-left-color:#03a9f4;font-weight:500}
.sb-item:hover:not(.active){background:var(--color-background-tertiary)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.appbar{background:#03a9f4;color:#fff;display:flex;align-items:center;height:46px;padding:0 8px;gap:4px;flex-shrink:0}
.appbar-title{font-size:14px;font-weight:500;flex:1}
.itabs{display:flex;gap:3px;padding:6px 12px 0;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.itab{padding:5px 11px;border-radius:7px 7px 0 0;cursor:pointer;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-bottom:2px solid var(--color-background-primary);font-size:11px;white-space:nowrap;position:relative;bottom:-1px}
.itab.active{background:#03a9f4;color:#fff;border-color:#03a9f4;border-bottom-color:#03a9f4;font-weight:500}
.scroll{overflow-y:auto;flex:1;padding:12px}
.wrap{max-width:880px;margin:0 auto}
.top-card{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;margin-bottom:10px}
.top-hdr{background:#03a9f4;color:#fff;padding:9px 14px;font-size:13px;font-weight:500}
.top-body{padding:10px 14px;background:var(--color-background-primary);display:flex;flex-direction:column;gap:8px}
.reg-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px}
.reg-bar.on{background:#16a34a22;border:0.5px solid #16a34a}
.reg-bar.off{background:#dc262622;border:0.5px solid #dc2626}
.reg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.reg-bar.on .reg-dot{background:#16a34a}
.reg-bar.off .reg-dot{background:#dc2626}
.info-acc{border:0.5px solid var(--color-border-tertiary);border-radius:8px;overflow:hidden;margin-bottom:12px}
.info-acc summary{padding:8px 12px;cursor:pointer;font-weight:500;font-size:12px;background:var(--color-background-secondary);color:#03a9f4;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
.info-acc summary::-webkit-details-marker{display:none}
.info-acc summary::before{content:"▶";font-size:.7em;transition:transform .2s}
.info-acc[open] summary::before{transform:rotate(90deg)}
.info-acc .info-body{padding:10px 12px;font-size:11px;line-height:1.65;color:var(--color-text-secondary);white-space:pre-wrap;border-top:0.5px solid var(--color-border-tertiary)}
.tpanel{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;margin-bottom:10px}
.tbar{background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;flex-wrap:wrap;padding:5px 5px 0;gap:2px}
.tab{padding:5px 9px;border-radius:6px 6px 0 0;cursor:pointer;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-bottom:1px solid var(--color-background-primary);font-size:11px;white-space:nowrap;position:relative;bottom:-1px}
.tab.active{background:#03a9f4;color:#fff;border-color:#03a9f4;border-bottom-color:#03a9f4;font-weight:500}
.tcontent{background:var(--color-background-primary);padding:12px}
.col-card{border:0.5px solid var(--color-border-tertiary);border-radius:9px;overflow:hidden;margin-bottom:10px}
.col-hdr{padding:7px 12px;color:#fff;font-weight:500;font-size:11px}
.col-body{padding:10px 12px;background:var(--color-background-primary);display:flex;flex-direction:column;gap:10px}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:6px;cursor:pointer}
.field input[type=number],.field input[type=text]{padding:5px 8px;border:0.5px solid var(--color-border-tertiary);border-radius:5px;background:var(--color-background-secondary);color:var(--color-text-primary);font-size:11px;width:100%}
.field input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#03a9f4}
.field select{padding:5px 8px;border:0.5px solid var(--color-border-tertiary);border-radius:5px;background:var(--color-background-secondary);color:var(--color-text-primary);font-size:11px;width:100%}
.desc{font-size:10px;color:var(--color-text-secondary);line-height:1.45}
.zone-banner{padding:9px;border-radius:7px;color:#fff;font-weight:500;font-size:13px;margin-bottom:10px;text-align:center}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.sc{border:0.5px solid var(--color-border-tertiary);border-radius:8px;overflow:hidden}
.sc-hdr{padding:6px 10px;color:#fff;font-weight:500;font-size:11px}
.sc-body{padding:8px 10px;background:var(--color-background-primary);display:flex;flex-direction:column;gap:6px}
.sr2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sv{padding:5px 8px;border-radius:5px;background:var(--color-background-secondary)}
.sv .val{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.sv .lbl{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.sv-full{padding:5px 8px;border-radius:5px;background:var(--color-background-secondary)}
.sv-full .val{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.sv-full .lbl{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.flags{display:flex;flex-wrap:wrap;gap:3px}
.flag{padding:2px 7px;border-radius:9px;font-size:10px;font-weight:500}
.flag.on{background:#16a34a22;color:#16a34a}
.flag.off{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.mlbl{font-size:10px;color:var(--color-text-secondary);margin-bottom:1px}
.mval{font-size:11px;color:var(--color-text-primary)}
.osrc{display:inline-block;padding:2px 7px;border-radius:9px;font-size:10px;font-weight:500}
.osrc.dyn{background:#16a34a22;color:#16a34a}
.osrc.stat{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ov-card{border:0.5px solid var(--color-border-tertiary);border-radius:9px;overflow:hidden;cursor:pointer}
.ov-card:hover{border-color:var(--color-border-secondary)}
.ov-hdr{padding:9px 12px;color:#fff;font-weight:500;font-size:12px}
.ov-body{padding:9px 12px;background:var(--color-background-primary);display:flex;flex-direction:column;gap:4px}
.ov-row{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary)}
.ov-row strong{color:var(--color-text-primary);font-weight:500}
.sec-hdr{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.dimmed{opacity:.35;pointer-events:none}
.save-bar{background:#03a9f4;color:#fff;padding:8px 14px;border-radius:8px;margin-top:8px;display:none;align-items:center;justify-content:space-between}
.save-bar.show{display:flex}
.save-bar button{background:#fff;color:#03a9f4;border:none;padding:5px 14px;border-radius:5px;cursor:pointer;font-weight:500;font-size:11px}
.prio-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-top:4px}
.prio-tbl th{background:var(--color-background-secondary);padding:4px 8px;text-align:left;font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary)}
.prio-tbl td{padding:3px 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.prio-tbl tr:last-child td{border-bottom:none}
</style>

<h2 class="sr-only">Vollständiges Solakon ONE Panel mit zwei Instanzen</h2>

<div class="shell">
  <div class="sb">
    <div class="sb-logo">Home Assistant</div>
    <div class="sb-item">Übersicht</div>
    <div class="sb-item">Energie</div>
    <div class="sb-item active">☀️ Solakon ONE</div>
    <div class="sb-item">Automationen</div>
    <div class="sb-item">Einstellungen</div>
  </div>
  <div class="main">
    <div class="appbar">
      <span style="font-size:18px;padding:6px;border-radius:50%">☰</span>
      <span class="appbar-title">Solakon ONE</span>
    </div>
    <div class="itabs">
      <div class="itab" id="it-ov" onclick="si('ov')">📊 Übersicht</div>
      <div class="itab active" id="it-a" onclick="si('a')">Solakon A</div>
      <div class="itab" id="it-b" onclick="si('b')">Solakon B</div>
    </div>
    <div class="scroll"><div class="wrap" id="content"></div></div>
  </div>
</div>

<script>
const DA={name:'Solakon A',zone:2,zl:'🔋 Zone 2 — Schonend',zc:'#0891b2',soc:74,out:312,grid:4,solar:580,int:12.40,std:18.3,fl:'Zone 2: Regelung aktiv',cy:false,reg:true,dyn_z2:true,offset:28,mode:'1'};
const DB={name:'Solakon B',zone:1,zl:'⚡ Zone 1 — Aggressiv',zc:'#16a34a',soc:41,out:180,grid:8,solar:320,int:3.10,std:9.7,fl:'Zone 1: Entladezyklus Start',cy:true,reg:true,dyn_z1:true,offset:38,mode:'1'};
const INST={a:DA,b:DB};
const TABS=[{id:'status',l:'📊 Status'},{id:'pi',l:'🎛️ PI-Regler'},{id:'zones',l:'🔋 Zonen'},{id:'surplus',l:'☀️ Überschuss'},{id:'ac',l:'⚡ AC Laden'},{id:'tariff',l:'💹 Tarif'},{id:'dynoff',l:'📈 Dyn. Offset'},{id:'night',l:'🌙 Nacht'},{id:'debug',l:'🔧 Debug'}];
let inst='a', tab='status';

function si(id){inst=id;tab='status';['ov','a','b'].forEach(k=>document.getElementById('it-'+k).className='itab'+(k===id?' active':''));render();}
function st(id){tab=id;render();}

// Separate Save-Bar Funktionen je Kontext
function dirty(){
  const s=document.getElementById('save-inst');
  if(s) s.className='save-bar show';
}
function dirtyDist(){
  const s=document.getElementById('save-dist');
  if(s) s.className='save-bar show';
}
function hideSave(id){ document.getElementById(id).className='save-bar'; }

function fi(l,d,t,v,x=''){return `<div class="field"><label>${l}</label>${d?`<div class="desc">${d}</div>`:''}<input type="${t}" value="${v}" ${x} oninput="dirty()"></div>`;}
function fb(l,d,chk,id=''){return `<div class="field"><label><input type="checkbox" ${chk?'checked':''} ${id?`id="${id}"`:''}  onchange="dirty()"> ${l}</label>${d?`<div class="desc">${d}</div>`:''}</div>`;}
function fsel(l,d,opts,sel,id=''){const os=opts.map(o=>`<option${o===sel?' selected':''}>${o}</option>`).join('');return `<div class="field"><label>${l}</label>${d?`<div class="desc">${d}</div>`:''}<select ${id?`id="${id}"`:''}  onchange="dirty()">${os}</select></div>`;}
function card(t,col,body){return `<div class="col-card"><div class="col-hdr" style="background:${col}">${t}</div><div class="col-body">${body}</div></div>`;}
function acc(sum,txt){return `<details class="info-acc"><summary>ℹ️ ${sum}</summary><div class="info-body">${txt}</div></details>`;}

function wireToggle(cbId,targetId){
  const cb=document.getElementById(cbId),tgt=document.getElementById(targetId);
  if(!cb||!tgt) return;
  const apply=()=>{tgt.className=cb.checked?'':'dimmed';};
  apply();
  cb.addEventListener('change',apply);
}

function render(){
  const c=document.getElementById('content');
  if(inst==='ov'){c.innerHTML='';renderOv(c);return;}
  const d=INST[inst];
  const tb=TABS.map(t=>`<div class="tab${t.id===tab?' active':''}" onclick="st('${t.id}')">${t.l}</div>`).join('');
  c.innerHTML=`
    <div class="top-card">
      <div class="top-hdr">⚡ Solakon ONE Nulleinspeisung — ${d.name}</div>
      <div class="top-body">
        <div class="reg-bar ${d.reg?'on':'off'}"><div class="reg-dot"></div><span>${d.reg?'Regelung aktiv — klicken zum Deaktivieren':'Regelung inaktiv'}</span></div>
        <details class="info-acc"><summary>ℹ️ Über diese Integration</summary><div class="info-body">PI-Regler mit Netzleistung als Regelgröße. Vier SOC-Zonen steuern das Verhalten.
<table class="prio-tbl" style="margin-top:6px"><tr><th>Prio</th><th>Modul</th><th>Blockiert</th></tr><tr><td>1</td><td>☀️ Überschuss</td><td>Tarif-Laden, Discharge-Lock, AC Laden</td></tr><tr><td>2</td><td>💹 Tarif-Laden</td><td>AC Laden, Discharge-Lock</td></tr><tr><td>3</td><td>💹 Discharge-Lock</td><td>Zone-1/2-Recovery</td></tr><tr><td>4</td><td>⚡ AC Laden</td><td>Tarif-Laden</td></tr><tr><td>5</td><td>🌙 Nacht</td><td>Zone-2-Start</td></tr></table></div></details>
      </div>
    </div>
    <div class="tpanel">
      <div class="tbar">${tb}</div>
      <div class="tcontent">${rTab(d)}</div>
    </div>
    <div class="save-bar" id="save-inst">
      <span>Ungespeicherte Änderungen</span>
      <button onclick="hideSave('save-inst')">💾 Speichern</button>
    </div>`;
  if(tab==='surplus') wireToggle('cb-surplus','blk-surplus-cols');
  if(tab==='ac')      wireToggle('cb-ac','blk-ac-cols');
  if(tab==='tariff')  wireToggle('cb-tariff','blk-tariff-cols');
}

function renderOv(c){
  const cards=Object.entries(INST).map(([k,d])=>`
    <div class="ov-card" onclick="si('${k}')">
      <div class="ov-hdr" style="background:${d.zc}">${d.zl} — ${d.name}</div>
      <div class="ov-body">
        <div class="ov-row"><span>Regelung</span><strong style="color:${d.reg?'#16a34a':'#dc2626'}">${d.reg?'aktiv':'inaktiv'}</strong></div>
        <div class="ov-row"><span>SOC</span><strong>${d.soc} %</strong></div>
        <div class="ov-row"><span>Ausgang</span><strong>${d.out} W</strong></div>
        <div class="ov-row"><span>Netz</span><strong>+${d.grid} W</strong></div>
        <div class="ov-row"><span>PV</span><strong>${d.solar} W</strong></div>
        <div class="ov-row"><span>Aktiver Fall</span><strong>${d.fl}</strong></div>
      </div>
    </div>`).join('');
  c.innerHTML=`<div class="ov-grid">${cards}</div><div class="sec-hdr">⚖️ Leistungsverteilung</div>`;
  c.querySelectorAll('.ov-card').forEach((el,i)=>el.addEventListener('click',()=>si(i===0?'a':'b')));

  const vd=document.createElement('div');
  c.appendChild(vd);
  vd.innerHTML=`
    ${card('🌐 Globale Einstellungen','#0891b2',
      `<div class="field"><label>Gesamte Max. Ausgangsleistung (W)</label><div class="desc">Absolute Obergrenze aller Instanzen zusammen. Standard: 800 W. Im manuellen Modus ignoriert.</div><input type="number" value="800" min="0" max="9600" step="10"></div>`+
      `<div class="field"><label>Aktualisierungsintervall</label><div class="desc">Wie oft die Verteilung neu berechnet wird.</div><select><option>10 s</option><option selected>30 s (empfohlen)</option><option>60 s</option><option>120 s</option><option>300 s</option></select></div>`)}
    ${card('⚖️ Verteilungs-Modus','#7c3aed',
      `<div class="field"><label>Modus</label><div class="desc">Gleichverteilung: gleich viel · Gewichtet: nach SOC/PV · Manuell: feste Wattzahl</div><select id="sel-mode"><option selected>Gleichverteilung</option><option>Gewichtet</option><option>Manuell</option></select></div>
       <div id="blk-w" class="dimmed"><div class="field"><label>SOC ←→ PV Gewichtung (0–1)</label><div class="desc">0,0 → nur SOC · 1,0 → nur PV · Nur bei Modus = Gewichtet</div><input type="number" value="0.5" min="0" max="1" step="0.05"></div></div>`)}
    <div id="blk-m" class="dimmed">
      ${card('🔧 Manuelle Leistung pro Instanz','#b45309',
        `<div class="cg2"><div class="field"><label>Solakon A (W)</label><div class="desc">Feste Ausgangsleistung — unabhängig von SOC oder PV.</div><input type="number" value="400" min="0" max="800" step="10"></div><div class="field"><label>Solakon B (W)</label><div class="desc">Feste Ausgangsleistung — unabhängig von SOC oder PV.</div><input type="number" value="400" min="0" max="800" step="10"></div></div>`)}
    </div>
    <div class="save-bar" id="save-dist">
      <span>Ungespeicherte Änderungen</span>
      <button id="save-dist-btn">💾 Speichern</button>
    </div>`;

  // Alle Inputs/Selects in der Verteilung lösen dirtyDist() aus
  vd.querySelectorAll('input,select').forEach(el=>{
    el.addEventListener('change', dirtyDist);
    el.addEventListener('input',  dirtyDist);
  });

  // Speichern-Button
  vd.querySelector('#save-dist-btn').addEventListener('click',()=>hideSave('save-dist'));

  // Modus-Dropdown schaltet Blöcke
  vd.querySelector('#sel-mode').addEventListener('change',function(){
    const m=this.value;
    vd.querySelector('#blk-w').className=m==='Gewichtet'?'':'dimmed';
    vd.querySelector('#blk-m').className=m==='Manuell'?'':'dimmed';
  });
}

function rTab(d){
  if(tab==='status')  return rStatus(d);
  if(tab==='pi')      return rPI();
  if(tab==='zones')   return rZones();
  if(tab==='surplus') return rSurplus();
  if(tab==='ac')      return rAC();
  if(tab==='tariff')  return rTariff();
  if(tab==='dynoff')  return rDynoff();
  if(tab==='night')   return rNight();
  if(tab==='debug')   return rDebug(d);
  return '';
}

function rStatus(d){
  const offLbl=d.cy?'Zone 1':'Zone 2';
  const isDyn=d.cy?!!d.dyn_z1:!!d.dyn_z2;
  return `<div class="zone-banner" style="background:${d.zc}">${d.zl}</div>
  <div class="sgrid">
    <div class="sc"><div class="sc-hdr" style="background:#0891b2">⚡ Messwerte</div><div class="sc-body">
      <div class="sr2"><div class="sv"><div class="val">+${d.grid} W</div><div class="lbl">Netzleistung</div></div><div class="sv"><div class="val">${d.soc} %</div><div class="lbl">SOC</div></div></div>
      <div class="sr2"><div class="sv"><div class="val">${d.out} W</div><div class="lbl">Ausgangsleistung</div></div><div class="sv"><div class="val">${d.solar} W</div><div class="lbl">Solarleistung</div></div></div>
    </div></div>
    <div class="sc"><div class="sc-hdr" style="background:#7c3aed">📈 Regelzustand</div><div class="sc-body">
      <div class="sr2"><div class="sv"><div class="val">${d.int.toFixed(2)}</div><div class="lbl">PI Integral</div></div><div class="sv"><div class="val">${d.std.toFixed(1)} W</div><div class="lbl">Netz-StdDev</div></div></div>
      <div class="sv-full"><div class="val">${d.offset} W</div><div class="lbl">Aktiver Offset — ${offLbl}</div>
        <div style="margin-top:3px"><span class="osrc ${isDyn?'dyn':'stat'}">${isDyn?'⚡ dynamisch':'dyn. inaktiv'}</span><span class="osrc stat">statisch: ${d.offset} W</span></div>
      </div>
      <div class="sr2"><div class="sv"><div class="val">3 s</div><div class="lbl">Seit letztem Output</div></div><div class="sv"><div class="val">4 min 12 s</div><div class="lbl">Seit Moduswechsel</div></div></div>
    </div></div>
    <div class="sc"><div class="sc-hdr" style="background:#b45309">🚦 Module & Status</div><div class="sc-body">
      <div class="mlbl">Aktive Module</div>
      <div class="flags"><span class="flag ${d.cy?'on':'off'}">${d.cy?'●':'○'} Zyklus</span><span class="flag off">○ Surplus</span><span class="flag off">○ AC Laden</span><span class="flag off">○ Tarif-Laden</span><span class="flag off">○ Nacht</span><span class="flag off">○ PV-Forecast</span></div>
      <div class="mlbl" style="margin-top:4px">Aktiver Fall</div><div class="mval">${d.fl}</div>
      <div class="mlbl" style="margin-top:4px">Betriebsmodus</div><div class="mval">Modus ${d.mode} — INV Discharge PV Priority</div>
      <div class="mlbl" style="margin-top:4px">Letzte Aktion</div><div class="mval">Output ${d.out} W gesetzt</div>
      <div class="mlbl" style="margin-top:4px">Fehler</div><div class="mval" style="color:var(--color-text-secondary)">Keine</div>
    </div></div>
  </div>`;
}

function rPI(){
  return acc('PI-Regler — Kern des Regelkreises','Regelgröße: Netzleistung. Stellgröße: AC-Ausgangsleistung.\nP-Anteil: reagiert sofort auf Abweichung (Grid − Offset). I-Anteil: summiert Abweichungen auf.\nAnti-Windup: ±1000. Integral-Reset bei Zonenwechsel. Toleranz-Decay: −5 %/Zyklus.\nEinstieg: P = 0.5, I = 0. P erhöhen bis Output pendelt, dann einen Schritt zurück.')+
  `<div class="cg2">
    ${card('🎛️ Regelparameter','#0891b2',
      fi('P-Faktor (Proportional)','Reagiert sofort auf die aktuelle Abweichung (Grid − Offset). Höher = aggressiver. Zu groß: Output pendelt dauerhaft. Typisch: 0.8–1.5','number',1.3,'min=0.1 max=5 step=0.1')+
      fi('I-Faktor (Integral)','Summiert Abweichungen über die Zeit auf, eliminiert bleibende Regelabweichungen. Startwert: 0. Erst erhöhen wenn P-Regelung stabil. Typisch: 0.03–0.08','number',0.05,'min=0 max=0.5 step=0.01')+
      fi('Toleranzbereich / Totband (W)','Abweichungen innerhalb dieses Bereichs lösen keinen PI-Eingriff aus — stattdessen greift der Integral-Decay.','number',15,'min=0 max=200 step=1')+
      fi('Wartezeit / Max-Timeout (s)','Pause nach einem Stelleingriff. Mit Self-Adjust: maximales Timeout.','number',3,'min=0 max=30 step=1'))}
    ${card('🎯 Self-Adjusting Wait','#7c3aed',
      fb('Self-Adjusting Wait aktivieren','Wartet auf tatsächliche WR-Ausgangsleistung statt fixer Pause. Sobald actual_power Sollwert ±Toleranz erreicht, geht der Regler weiter.',false)+
      fi('Zielwert-Toleranz (W)','Abweichung in W ab der der Zielwert als erreicht gilt. Typisch: 2–5 W.','number',2,'min=1 max=50 step=1'))}
  </div>`;
}

function rZones(){
  return acc('SOC-Zonenlogik','Zone 1: SOC > Schwelle → hoher Entladestrom. Läuft bis SOC ≤ Zone-3-Schwelle.\nZone 2: Zone-3 < SOC ≤ Zone-1 → 0 A Entladestrom, Limit max(0, PV − Reserve).\nZone 3: SOC ≤ Zone-3-Schwelle → Output 0 W, Modus Disabled.\nZone 0: optional — Überschuss-Tab.')+
  `<div class="cg3">
    ${card('🔋 SOC-Grenzen','#0891b2',
      fi('Zone 1 SOC-Schwelle (%)','SOC überschreitet → Zone 1 startet. Läuft bis SOC ≤ Zone-3-Schwelle — kein Yo-Yo-Effekt.','number',50,'min=1 max=99 step=1')+
      fi('Zone 3 SOC-Schwelle (%)','SOC unterschreitet → Sicherheitsstopp. Muss kleiner als Zone-1-Schwelle sein.','number',20,'min=1 max=49 step=1')+
      fi('PV-Ladereserve (W)','Zone-2-Output-Limit: max(0, PV − Reserve). Auch Schwelle für die Nachtabschaltung.','number',50,'min=0 max=500 step=10'))}
    ${card('⚙️ Leistungsgrenzen','#b45309',
      fi('Hard Limit (W)','Absolute Ausgangsleistungs-Obergrenze in Zone 0 und Zone 1.','number',800,'min=100 max=2000 step=50')+
      fi('Max. Entladestrom Zone 1 (A)','Entladestrom in Zone 1. Zone 2 und AC Laden setzen automatisch 0 A.','number',40,'min=1 max=100 step=1'))}
    ${card('🎯 Offsets','#7c3aed',
      fi('Offset Zone 1 (W)','Regelziel in Zone 1. Positiv = leichter Netzbezug als Sicherheitspuffer. Wird überschrieben wenn Dyn. Offset Zone 1 aktiv.','number',30,'min=-200 max=300 step=1')+
      fi('Offset Zone 2 (W)','Regelziel in Zone 2. Empfohlen: etwas größer als Zone-1-Offset. Wird überschrieben wenn Dyn. Offset Zone 2 aktiv.','number',10,'min=-200 max=300 step=1'))}
  </div>`;
}

function rSurplus(){
  return acc('Überschuss-Einspeisung — Zone 0','Höchste Priorität. Eintritt: SOC ≥ Schwelle UND PV > Output + Grid + PV-Hysterese.\nAustritt: SOC < (Schwelle − SOC-Hysterese) ODER PV ≤ Output + Grid − PV-Hysterese.\nOutput auf Hard Limit. Integral eingefroren.')+
  card('⚙️ Allgemein','#475569',fb('Überschuss-Einspeisung aktivieren','Höchste Priorität — blockiert Tarif-Laden, Discharge-Lock und AC Laden solange Zone 0 aktiv.',false,'cb-surplus'))+
  `<div id="blk-surplus-cols" class="dimmed" style="margin-top:10px"><div class="cg2">
    ${card('🔋 SOC-Bedingung','#0891b2',
      fi('SOC-Schwelle (%)','Zone 0 startet ab diesem SOC. Empfohlen: > Zone-1-Schwelle. Typisch: 90–98 %.','number',95,'min=50 max=100 step=1')+
      fi('SOC-Hysterese (%)','Austritt erst wenn SOC < (Schwelle − Hysterese). Verhindert Flackern. Typisch: 3–5 %.','number',5,'min=1 max=20 step=1'))}
    ${card('☀️ PV-Bedingung','#f59e0b',

  </div></div>`;
}

function rAC(){

  card('⚙️ Allgemein','#475569',fb('AC Laden aktivieren','Eintritt: SOC < Ladeziel UND kein Überschuss UND Modus ≠ 3. SOC-Schutz (Zone 3) bleibt aktiv.',false,'cb-ac'))+
  `<div id="blk-ac-cols" class="dimmed" style="margin-top:10px"><div class="cg2">
    ${card('⚡ Eintritt & Grenzen','#7c3aed',
      fi('Ladeziel SOC (%)','Laden stoppt wenn SOC diesen Wert erreicht. Empfohlen: > Zone-1-Schwelle.','number',90,'min=50 max=100 step=1')+
      fi('Max. Ladeleistung (W)','Absolute Obergrenze der AC-Ladeleistung.','number',800,'min=100 max=2000 step=50')+

      fi('Regel-Offset (W)','Regelziel im AC-Lade-Modus. Negativ = Einspeisung angestrebt → PI erhöht Ladeleistung.','number',-50,'min=-500 max=200 step=5'))}

}

function rDynoff(){
  const zn=(t,c)=>card(t,c,
    fb('Aktivieren','Berechnet den Offset dynamisch aus der Netz-StdDev statt des statischen Werts.',false)+
    fi('Min. Offset (W)','Grundpuffer bei ruhigem Netz (StdDev ≤ Rausch-Schwelle). Offset sinkt nie unter diesen Wert.','number',30,'min=0 max=500 step=1')+
    fi('Max. Offset (W)','Obergrenze — steigt nie über diesen Wert.','number',250,'min=50 max=1000 step=10')+
    fi('Rausch-Schwelle (W)','StdDev unterhalb gilt als Messrauschen — löst keinen Offset-Anstieg aus.','number',15,'min=0 max=100 step=1')+
    fi('Volatilitäts-Faktor','Verstärkung: buffer = (StdDev − Rausch) × Faktor.','number',1.5,'min=0.5 max=5 step=0.1')+
    fb('Negativer Offset','Negiert den Offset (× −1). Regelziel liegt unterhalb von 0 W.',false));
  return acc('Dynamischer Offset — aus Netz-Volatilität','Formel: offset = clamp(min + max(0, (StdDev − Rausch) × Faktor), min, max)\n\n• StdDev 5 W → 30 W · StdDev 30 W → 53 W · StdDev 80 W → 128 W · StdDev 250 W+ → 250 W')+
  card('⚙️ Allgemein','#475569',fi('Stabw.-Fenster (s)','Zeitfenster für die Standardabweichungs-Berechnung. Gilt für alle Zonen.','number',60,'min=30 max=300 step=10'))+
  `<div class="cg3" style="margin-top:10px">${zn('⚡ Zone 1','#16a34a')}${zn('🔋 Zone 2','#0891b2')}${zn('⚡ Zone AC','#7c3aed')}</div>`;
}

function rNight(){
  return acc('Nachtabschaltung — Zone 2 bei PV < PV-Ladereserve','Betrifft ausschließlich Zone 2 (Fall F): Modus → Disabled, Output 0 W, Integral-Reset.\nZone 1 und AC Laden laufen auch nachts weiter.\nReaktivierung: PV > PV-Ladereserve, sofern kein Tarif-Lock aktiv.')+
  card('⚙️ Allgemein','#475569',fb('Nachtabschaltung aktivieren','Zone 2 bei PV < PV-Ladereserve deaktivieren. Zone 1 und AC Laden laufen weiter.',false));
}
